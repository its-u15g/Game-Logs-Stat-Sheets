<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITS U-15 | リアルタイム分析統合アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --team-main: #0A2444;
            --team-sub: #0077B6;
            --team-accent: #F59E0B;
            --bg-color: #e2e8f0;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; 
            background-color: var(--bg-color);
            color: #334155;
            overscroll-behavior-y: none;
        }
        .text-team-main { color: var(--team-main); }
        .text-team-sub { color: var(--team-sub); }
        .bg-team-main { background-color: var(--team-main); }
        .bg-team-sub { background-color: var(--team-sub); }
        .bg-team-accent { background-color: var(--team-accent); }
        
        button { touch-action: manipulation; transition: transform 0.05s, opacity 0.2s, background-color 0.2s; }
        .btn-tap:active { transform: scale(0.95); opacity: 0.9; }
        .stat-value { font-variant-numeric: tabular-nums; font-family: 'Arial', sans-serif; letter-spacing: -0.02em; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }

        /* ダッシュボードのプログレスバー */
        .bar-bg { background-color: #e2e8f0; border-radius: 999px; overflow: hidden; height: 8px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .text-gradient-blue { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(135deg, var(--team-main), var(--team-sub)); }
        .text-gradient-amber { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(135deg, #d97706, #fbbf24); }
        .text-gradient-rose { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(135deg, #be123c, #fb7185); }
        .text-gradient-slate { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(135deg, #475569, #94a3b8); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 🌟 モード切替タブ (固定) -->
    <nav class="bg-slate-800 flex text-xs font-bold shadow-md z-30 flex-shrink-0">
        <button id="tab-input" onclick="switchTab('input')" class="flex-1 py-2 text-center border-b-2 border-team-sub text-white bg-slate-900 transition-colors flex justify-center items-center gap-1.5">
            <i class="fas fa-edit"></i> <span>入力モード</span>
        </button>
        <button id="tab-dashboard" onclick="switchTab('dashboard')" class="flex-1 py-2 text-center border-b-2 border-transparent hover:bg-slate-700 text-slate-400 transition-colors flex justify-center items-center gap-1.5">
            <i class="fas fa-chart-pie"></i> <span>リアルタイム分析</span>
        </button>
    </nav>

    <!-- 🌟 メインスクロールエリア -->
    <div class="flex-grow overflow-y-auto flex flex-col bg-slate-200 relative" id="main-scroll-area">
        
        <!-- ========================================== -->
        <!-- 📝 ビュー：入力モード -->
        <!-- ========================================== -->
        <div id="view-input" class="flex flex-col flex-grow bg-[var(--bg-color)]">
            <header class="bg-team-main text-white shadow z-20 flex-shrink-0 flex flex-col sticky top-0">
                <!-- 上段：タイトル、スコア、ボタン (極小化) -->
                <div class="w-full max-w-5xl mx-auto px-2 py-1 flex justify-between items-center border-b border-white/10">
                    <h1 class="text-xs sm:text-sm font-bold tracking-wider flex items-center whitespace-nowrap">
                        <i class="fas fa-clipboard-check mr-1 text-team-sub"></i> <span class="hidden sm:inline">ITS </span>U-15
                    </h1>
                    
                    <!-- ライブスコアボード -->
                    <div class="flex items-center bg-slate-900/80 rounded px-3 py-0.5 shadow-inner mx-2 border border-slate-700">
                        <div class="flex flex-col items-center min-w-[24px] sm:min-w-[30px]">
                            <span class="text-[7px] sm:text-[8px] text-team-sub font-bold leading-none mb-0.5">自チーム</span>
                            <span class="text-lg sm:text-xl font-black text-white leading-none stat-value" id="score-team">0</span>
                        </div>
                        <span class="text-slate-500 font-black mx-2 text-sm sm:text-base">-</span>
                        <div class="flex flex-col items-center min-w-[24px] sm:min-w-[30px]">
                            <span class="text-[7px] sm:text-[8px] text-rose-400 font-bold leading-none mb-0.5">相手</span>
                            <span class="text-lg sm:text-xl font-black text-white leading-none stat-value" id="score-opponent">0</span>
                        </div>
                    </div>

                    <div class="flex gap-1">
                        <button onclick="undo()" id="undo-btn" class="px-2 py-1 bg-white/10 hover:bg-white/20 text-white text-[10px] sm:text-xs font-bold rounded shadow-sm disabled:opacity-30 flex items-center btn-tap">
                            <i class="fas fa-undo"></i><span class="hidden sm:inline ml-1">戻す</span>
                        </button>
                        <button onclick="saveToSpreadsheet()" id="save-btn" class="px-2 sm:px-3 py-1 bg-team-accent hover:bg-yellow-500 text-white text-[10px] sm:text-xs font-bold rounded shadow-sm flex items-center btn-tap">
                            <i class="fas fa-cloud-upload-alt"></i><span class="hidden sm:inline ml-1">保存</span>
                        </button>
                    </div>
                </div>
                
                <!-- 相手・GKパネル (マージン/パディング最小化) -->
                <div class="w-full bg-[#06172e] py-1 px-1 sm:px-2">
                    <div class="max-w-5xl mx-auto flex flex-col gap-0.5" id="gk-header-container"></div>
                </div>
            </header>

            <div class="w-full max-w-5xl mx-auto px-1 pt-1 pb-1 overflow-x-hidden flex-grow flex flex-col">
                <!-- CPコンテナ (1画面に収めるためギャップを最小に) -->
                <div id="cp-container" class="grid grid-cols-2 md:grid-cols-3 gap-1 sm:gap-1.5"></div>
                
                <!-- 試合情報 (スクロールして下部で確認するエリアに配置) -->
                <div class="bg-white border-t-2 border-team-main p-2 sm:p-3 shadow-sm mt-4 mb-2 rounded w-full">
                    <div class="flex gap-2">
                        <div class="flex-[1]">
                            <label class="block text-[10px] font-bold text-slate-500 mb-0.5">試合日</label>
                            <input type="date" id="match-date" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:border-team-sub">
                        </div>
                        <div class="flex-[2]">
                            <label class="block text-[10px] font-bold text-slate-500 mb-0.5">対戦相手</label>
                            <input type="text" id="opponent-name" class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs focus:outline-none focus:border-team-sub" placeholder="例：〇〇中学校">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 📊 ビュー：リアルタイム分析ダッシュボード -->
        <!-- ========================================== -->
        <div id="view-dashboard" class="hidden flex-col flex-grow bg-[#f1f5f9] p-4 sm:p-6 w-full">
            <div class="max-w-5xl mx-auto w-full flex flex-col gap-4 sm:gap-6 animate-fade-in pb-8">
                
                <h2 class="text-base sm:text-lg font-black text-slate-400 tracking-widest flex items-center mb-1">
                    <i class="fas fa-bolt text-[#F59E0B] mr-2"></i> TEAM DASHBOARD
                </h2>

                <!-- 🆕 3項目並びのメインサマリー -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-5">
                    <!-- 1. チーム シュート成功率 -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 flex flex-col justify-between relative overflow-hidden">
                        <div class="flex justify-between items-end mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-[#0077B6]"><i class="fas fa-bullseye text-base sm:text-lg"></i></div>
                                <div class="text-xs sm:text-sm font-black text-slate-700">自チーム 決定率</div>
                            </div>
                            <div class="text-[10px] sm:text-xs font-bold text-slate-400">ゴール <span class="text-slate-600 text-sm sm:text-base" id="rt-dash-shot-detail">0 / 0</span></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-3xl sm:text-5xl font-black text-[#0077B6] stat-value leading-none"><span id="rt-dash-shot-rate">0.0</span><span class="text-base sm:text-xl text-slate-400 ml-0.5">%</span></div>
                            <div class="flex-grow bar-bg"><div class="bar-fill bg-gradient-to-r from-[#0A2444] to-[#0077B6]" id="rt-bar-shot-rate" style="width: 0%;"></div></div>
                        </div>
                    </div>

                    <!-- 2. GK セーブ率 -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 flex flex-col justify-between relative overflow-hidden">
                        <div class="flex justify-between items-end mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-[#0A2444]"><i class="fas fa-hands text-base sm:text-lg"></i></div>
                                <div class="text-xs sm:text-sm font-black text-slate-700">GK セーブ率</div>
                            </div>
                            <div class="text-[10px] sm:text-xs font-bold text-slate-400">セーブ <span class="text-slate-600 text-sm sm:text-base" id="rt-dash-save-detail">0 / 0</span></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-3xl sm:text-5xl font-black text-[#0A2444] stat-value leading-none"><span id="rt-dash-save-rate">0.0</span><span class="text-base sm:text-xl text-slate-400 ml-0.5">%</span></div>
                            <div class="flex-grow bar-bg"><div class="bar-fill bg-gradient-to-r from-slate-500 to-[#0A2444]" id="rt-bar-save-rate" style="width: 0%;"></div></div>
                        </div>
                    </div>

                    <!-- 3. 相手チーム シュート成功率 -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 flex flex-col justify-between relative overflow-hidden">
                        <div class="flex justify-between items-end mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-lg bg-rose-50 flex items-center justify-center text-rose-500"><i class="fas fa-crosshairs text-base sm:text-lg"></i></div>
                                <div class="text-xs sm:text-sm font-black text-slate-700">相手 決定率</div>
                            </div>
                            <div class="text-[10px] sm:text-xs font-bold text-slate-400">被ゴール <span class="text-slate-600 text-sm sm:text-base" id="rt-dash-opponent-shot-detail">0 / 0</span></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-3xl sm:text-5xl font-black text-rose-500 stat-value leading-none"><span id="rt-dash-opponent-shot-rate">0.0</span><span class="text-base sm:text-xl text-slate-400 ml-0.5">%</span></div>
                            <div class="flex-grow bar-bg"><div class="bar-fill bg-gradient-to-r from-rose-300 to-rose-500" id="rt-bar-opponent-shot-rate" style="width: 0%;"></div></div>
                        </div>
                    </div>
                </div>

                <!-- 小項目パネル (大きく、読みやすく変更) -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
                    <!-- 得点 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-5 flex flex-col justify-center items-center">
                        <div class="text-xs sm:text-sm font-bold text-slate-400 mb-1">自チーム得点</div>
                        <div class="text-3xl sm:text-4xl font-black text-gradient-blue stat-value leading-none" id="rt-dash-goals">0</div>
                    </div>
                    <!-- 失点 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-5 flex flex-col justify-center items-center">
                        <div class="text-xs sm:text-sm font-bold text-slate-400 mb-1">相手得点 (失点)</div>
                        <div class="text-3xl sm:text-4xl font-black text-gradient-rose stat-value leading-none" id="rt-dash-allowed">0</div>
                    </div>
                    <!-- 自ミス -->
                    <div class="bg-gradient-to-br from-amber-50 to-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-5 flex flex-col justify-center items-center">
                        <div class="text-xs sm:text-sm font-bold text-amber-600 mb-1">自チーム ミス</div>
                        <div class="text-3xl sm:text-4xl font-black text-gradient-amber stat-value leading-none" id="rt-dash-errors">0</div>
                    </div>
                    <!-- 相手ミス -->
                    <div class="bg-gradient-to-br from-slate-50 to-white rounded-xl shadow-sm border border-slate-200 p-3 sm:p-5 flex flex-col justify-center items-center">
                        <div class="text-xs sm:text-sm font-bold text-slate-500 mb-1">相手チーム ミス</div>
                        <div class="text-3xl sm:text-4xl font-black text-gradient-slate stat-value leading-none" id="rt-dash-opponent-errors">0</div>
                    </div>
                </div>

                <div class="flex flex-col gap-4 sm:gap-5 mt-2">
                    <!-- 自チームシュート -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 relative overflow-hidden">
                        <h3 class="text-sm sm:text-base font-black text-slate-700 mb-3 flex items-center"><i class="fas fa-bullseye text-[#0077B6] mr-2"></i>自チーム シュート種類別の決定率</h3>
                        <div class="grid grid-cols-4 sm:grid-cols-7 gap-2 sm:gap-3" id="rt-shot-types-container"></div>
                    </div>

                    <!-- 相手シュート(失点) -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 relative overflow-hidden">
                        <h3 class="text-sm sm:text-base font-black text-slate-700 mb-3 flex items-center"><i class="fas fa-shield-alt text-rose-500 mr-2"></i>相手チーム シュート種類別の決定率 (自チームの失点率)</h3>
                        <div class="grid grid-cols-4 sm:grid-cols-7 gap-2 sm:gap-3" id="rt-gk-shot-types-container"></div>
                    </div>
                </div>

                <!-- 選手別スタッツ -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-5 relative overflow-hidden">
                    <h3 class="text-sm sm:text-base font-black text-slate-700 mb-3 flex items-center"><i class="fas fa-users text-[#0077B6] mr-2"></i>選手別スタッツ (現在記録がある選手のみ)</h3>
                    <div class="overflow-x-auto pb-2">
                        <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs sm:text-sm font-bold border-b border-slate-200 uppercase tracking-wider">
                                    <th class="p-3 sm:p-4 rounded-tl-lg">選手名</th>
                                    <th class="p-3 sm:p-4 text-center">POS</th>
                                    <th class="p-3 sm:p-4 text-right">シュート / 決定率</th>
                                    <th class="p-3 sm:p-4 text-center">シュート内訳 (L/M/C/P/F/S/7m)</th>
                                    <th class="p-3 sm:p-4 text-center">ミス</th>
                                    <th class="p-3 sm:p-4 text-right rounded-tr-lg">セーブ / セーブ率</th>
                                </tr>
                            </thead>
                            <tbody id="rt-player-stats-container" class="text-sm divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- 交代モーダル -->
    <div id="swap-modal" class="hidden fixed inset-0 bg-slate-900/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm modal-animate">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[85vh]">
            <div class="bg-team-main text-white px-4 py-3 flex justify-between items-center">
                <h3 class="font-bold flex items-center"><i class="fas fa-exchange-alt mr-2 text-team-sub"></i> 選手を交代</h3>
                <button onclick="closeSwapModal()" class="text-white/70 hover:text-white text-xl p-1 leading-none">&times;</button>
            </div>
            <div class="bg-slate-50 px-3 py-2 text-xs text-slate-500 font-bold border-b border-slate-200">ベンチメンバー</div>
            <div class="p-2 overflow-y-auto space-y-1.5 flex-grow" id="swap-list"></div>
            <div class="p-3 border-t border-slate-200 bg-white">
                <button onclick="executeAddNew()" class="w-full py-2.5 bg-blue-50 text-team-sub font-bold rounded-lg border border-blue-200 hover:bg-blue-100 flex justify-center items-center gap-1 transition-colors btn-tap">
                    <i class="fas fa-user-plus"></i> 新しい選手を追加して交代
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 設定と状態管理
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzVq24DpMl9rmH2wj9a31WZKdHt5kLx0IPhcLszblpNqcZmgf3UEhWQjEqc9I5ikz9wmg/exec";

        window.onload = () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('match-date').value = `${yyyy}-${mm}-${dd}`;
        };

        const initialShots = () => ({
            L: { goals: 0, miss: 0 }, M: { goals: 0, miss: 0 }, C: { goals: 0, miss: 0 }, 
            P: { goals: 0, miss: 0 }, F: { goals: 0, miss: 0 }, S: { goals: 0, miss: 0 }, '7m': { goals: 0, miss: 0 }
        });

        const initialGKShots = () => ({
            L: { saves: 0, allowed: 0 }, M: { saves: 0, allowed: 0 }, C: { saves: 0, allowed: 0 }, 
            P: { saves: 0, allowed: 0 }, F: { saves: 0, allowed: 0 }, S: { saves: 0, allowed: 0 }, '7m': { saves: 0, allowed: 0 }
        });

        let state = {
            allPlayers: {
                cp: [
                    { id: 'cp_1', name: '選手 1', shots: initialShots(), errors: 0 },
                    { id: 'cp_2', name: '選手 2', shots: initialShots(), errors: 0 },
                    { id: 'cp_3', name: '選手 3', shots: initialShots(), errors: 0 },
                    { id: 'cp_4', name: '選手 4', shots: initialShots(), errors: 0 },
                    { id: 'cp_5', name: '選手 5', shots: initialShots(), errors: 0 },
                    { id: 'cp_6', name: '選手 6', shots: initialShots(), errors: 0 },
                    { id: 'cp_7', name: '選手 7(ベンチ)', shots: initialShots(), errors: 0 }
                ],
                gk: [
                    { id: 'gk_1', name: 'GK 1', faced: initialGKShots(), errors: 0 }
                ]
            },
            opponentStats: { errors: 0 },
            activeCPIds: ['cp_1', 'cp_2', 'cp_3', 'cp_4', 'cp_5', 'cp_6'],
            activeGKId: 'gk_1'
        };

        let history = []; 
        let selectedShotTypes = {}; 
        let currentSwapTarget = { type: null, index: null }; 
        const typeLabels = { L: 'ﾃﾞｨｽﾀﾝｽ', M: 'ﾐﾄﾞﾙ', C: 'ｶｯﾄｲﾝ', P: 'ﾎﾟｽﾄ', F: 'ﾉｰﾏｰｸ', S: 'ｻｲﾄﾞ', '7m': '7mｽﾛｰ' };
        const shotTypesArray = ['L', 'M', 'C', 'P', 'F', 'S', '7m'];

        // ==========================================
        // 🔄 タブ（ビュー）切り替えロジック
        // ==========================================
        function switchTab(tabName) {
            const tabInput = document.getElementById('tab-input');
            const tabDashboard = document.getElementById('tab-dashboard');
            const viewInput = document.getElementById('view-input');
            const viewDashboard = document.getElementById('view-dashboard');

            if (tabName === 'input') {
                tabInput.className = "flex-1 py-2 text-center border-b-2 border-team-sub text-white bg-slate-900 transition-colors flex justify-center items-center gap-1.5";
                tabDashboard.className = "flex-1 py-2 text-center border-b-2 border-transparent hover:bg-slate-700 text-slate-400 transition-colors flex justify-center items-center gap-1.5";
                viewInput.classList.remove('hidden'); viewInput.classList.add('flex');
                viewDashboard.classList.add('hidden'); viewDashboard.classList.remove('flex');
            } else if (tabName === 'dashboard') {
                tabDashboard.className = "flex-1 py-2 text-center border-b-2 border-team-sub text-white bg-slate-900 transition-colors flex justify-center items-center gap-1.5";
                tabInput.className = "flex-1 py-2 text-center border-b-2 border-transparent hover:bg-slate-700 text-slate-400 transition-colors flex justify-center items-center gap-1.5";
                viewDashboard.classList.remove('hidden'); viewDashboard.classList.add('flex');
                viewInput.classList.add('hidden'); viewInput.classList.remove('flex');
                
                renderRealtimeDashboard();
            }
        }

        // ==========================================
        // 📝 入力アプリのロジック
        // ==========================================
        async function saveToSpreadsheet() {
            const matchDate = document.getElementById('match-date').value;
            const opponent = document.getElementById('opponent-name').value || '対戦相手未入力';
            let payload = [];

            state.allPlayers.cp.forEach(p => {
                let totalShots = 0;
                for(let t in p.shots) totalShots += p.shots[t].goals + p.shots[t].miss;
                if (totalShots > 0 || p.errors > 0) {
                    payload.push({
                        matchDate: matchDate, opponent: opponent, name: p.name, position: 'CP',
                        L_goals: p.shots.L.goals, L_miss: p.shots.L.miss,
                        M_goals: p.shots.M.goals, M_miss: p.shots.M.miss,
                        C_goals: p.shots.C.goals, C_miss: p.shots.C.miss,
                        F_goals: p.shots.F.goals, F_miss: p.shots.F.miss,
                        S_goals: p.shots.S.goals, S_miss: p.shots.S.miss,
                        '7m_goals': p.shots['7m'].goals, '7m_miss': p.shots['7m'].miss,
                        P_goals: p.shots.P.goals, P_miss: p.shots.P.miss,
                        errors: p.errors, opponent_errors: state.opponentStats.errors
                    });
                }
            });

            state.allPlayers.gk.forEach(p => {
                let totalSaves = 0, totalAllowed = 0;
                for(let t in p.faced) { totalSaves += p.faced[t].saves; totalAllowed += p.faced[t].allowed; }
                
                if (totalSaves > 0 || totalAllowed > 0 || p.errors > 0) {
                    payload.push({
                        matchDate: matchDate, opponent: opponent, name: p.name, position: 'GK',
                        saves: totalSaves, allowed: totalAllowed,
                        L_saves: p.faced.L.saves, L_allowed: p.faced.L.allowed,
                        M_saves: p.faced.M.saves, M_allowed: p.faced.M.allowed,
                        C_saves: p.faced.C.saves, C_allowed: p.faced.C.allowed,
                        P_saves: p.faced.P.saves, P_allowed: p.faced.P.allowed,
                        F_saves: p.faced.F.saves, F_allowed: p.faced.F.allowed,
                        S_saves: p.faced.S.saves, S_allowed: p.faced.S.allowed,
                        saves_7m: p.faced['7m'].saves, allowed_7m: p.faced['7m'].allowed,
                        errors: p.errors, opponent_errors: state.opponentStats.errors
                    });
                }
            });

            if(payload.length === 0) { alert("送信するデータがありません。"); return; }

            const btn = document.getElementById('save-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 送信中...'; btn.disabled = true;

            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
                alert("記録が完了しました！\n（※新しい項目Pや相手シュート詳細を記録するためには、後日スプレッドシートへの列追加が必要です）");
                if(confirm("データをリセットして新しく記録を始めますか？")) resetAllStats();
            } catch(e) {
                alert("通信エラーが発生しました。");
            } finally {
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        }

        function resetAllStats() {
            state.allPlayers.cp.forEach(p => { p.shots = initialShots(); p.errors = 0; });
            state.allPlayers.gk.forEach(p => { p.faced = initialGKShots(); p.errors = 0; });
            state.opponentStats.errors = 0;
            history = []; selectedShotTypes = {};
            document.getElementById('opponent-name').value = ''; 
            renderAll();
        }

        function saveState() { history.push(JSON.parse(JSON.stringify(state))); if (history.length > 20) history.shift(); document.getElementById('undo-btn').disabled = false; }
        function undo() { if (history.length > 0) { state = history.pop(); if (history.length === 0) document.getElementById('undo-btn').disabled = true; selectedShotTypes = {}; renderAll(); } }
        function updateName(type, id, newName) { const player = state.allPlayers[type].find(p => p.id === id); if (player) player.name = newName; renderAll(); }
        
        function getBtnClass(id, t, isGk = false) {
            const isSel = selectedShotTypes[id] === t;
            if(isGk) {
                return isSel ? "py-1 text-[10px] sm:text-[11px] font-bold rounded border bg-team-sub text-white border-team-sub transform scale-95 shadow-inner leading-none" 
                             : "py-1 text-[10px] sm:text-[11px] font-bold rounded border bg-[#0A2444] text-slate-300 border-white/20 hover:bg-[#113259] leading-none";
            }
            return isSel ? "flex-1 py-1 text-[10px] sm:text-[11px] font-bold rounded border bg-team-main text-white border-team-main transform scale-95 shadow-inner leading-none" 
                         : "flex-1 py-1 text-[10px] sm:text-[11px] font-bold rounded border bg-slate-50 text-slate-600 border-slate-300 hover:bg-slate-100 leading-none";
        }

        function selectType(id, type, isGk = false) {
            selectedShotTypes[id] = type;
            shotTypesArray.forEach(t => {
                const btn = document.getElementById(`type-${t}-${id}`);
                if (btn) btn.className = getBtnClass(id, t, isGk) + " flex flex-col items-center justify-center btn-tap leading-none";
            });
        }
        
        function resetTypeSelection(id, isGk = false) { 
            selectedShotTypes[id] = null; 
            shotTypesArray.forEach(t => { 
                const btn = document.getElementById(`type-${t}-${id}`); 
                if (btn) btn.className = getBtnClass(id, t, isGk) + " flex flex-col items-center justify-center btn-tap leading-none"; 
            }); 
        }
        
        function showWarning(id) { const warn = document.getElementById(`warn-${id}`); if (warn) { warn.classList.remove('hidden'); warn.classList.add('flex'); setTimeout(() => { warn.classList.add('hidden'); warn.classList.remove('flex'); }, 1500); } }

        function recordCP(id, action) {
            const player = state.allPlayers.cp.find(p => p.id === id);
            if (!player) return;
            if (action === 'goal' || action === 'miss') {
                const type = selectedShotTypes[id];
                if (!type) { showWarning(id); return; }
                saveState();
                if (action === 'goal') player.shots[type].goals++; else player.shots[type].miss++;
                resetTypeSelection(id); updateInputDisplays();
            } else if (action === 'error') { saveState(); player.errors++; updateInputDisplays(); }
        }

        function recordGK(id, action) {
            const player = state.allPlayers.gk.find(p => p.id === id);
            if (!player) return;

            if (action === 'save' || action === 'allowed') {
                const type = selectedShotTypes[id];
                if (!type) { showWarning(id); return; }
                saveState();
                if (action === 'save') player.faced[type].saves++; else player.faced[type].allowed++;
                resetTypeSelection(id, true); updateInputDisplays();
            } else if (action === 'error') {
                saveState(); player.errors++; updateInputDisplays();
            }
        }

        function recordOpponent(action) { saveState(); if (action === 'error') state.opponentStats.errors++; updateInputDisplays(); }

        // --- 交代機能 ---
        function openSwapModal(type, index = 0) {
            currentSwapTarget = { type, index };
            const modal = document.getElementById('swap-modal');
            const listContainer = document.getElementById('swap-list');
            const activeIds = type === 'cp' ? state.activeCPIds : [state.activeGKId];
            const benchPlayers = state.allPlayers[type].filter(p => !activeIds.includes(p.id));

            if (benchPlayers.length === 0) {
                listContainer.innerHTML = `<div class="text-center text-slate-400 py-4 text-sm">ベンチに選手がいません。</div>`;
            } else {
                listContainer.innerHTML = benchPlayers.map(p => {
                    let statText = "";
                    if (type === 'cp') {
                        let g=0, m=0; for(let t in p.shots){ g+=p.shots[t].goals; m+=p.shots[t].miss; }
                        statText = `シュート: ${g}/${g+m}`;
                    } else {
                        let s=0, a=0; for(let t in p.faced){ s+=p.faced[t].saves; a+=p.faced[t].allowed; }
                        statText = `セーブ: ${s}/${s+a}`;
                    }
                    return `<button onclick="executeSwap('${p.id}')" class="w-full text-left bg-white border border-slate-200 p-3 rounded-lg hover:bg-slate-50 hover:border-team-sub transition-colors flex justify-between items-center btn-tap"><span class="font-bold text-slate-700">${p.name}</span><span class="text-xs text-slate-400">${statText}</span></button>`;
                }).join('');
            }
            modal.classList.remove('hidden');
        }
        function closeSwapModal() { document.getElementById('swap-modal').classList.add('hidden'); }
        function executeSwap(newId) { saveState(); if (currentSwapTarget.type === 'cp') state.activeCPIds[currentSwapTarget.index] = newId; else state.activeGKId = newId; closeSwapModal(); renderAll(); }
        function executeAddNew() {
            const type = currentSwapTarget.type; const newId = type + '_' + Date.now(); const newNum = state.allPlayers[type].length + 1;
            if (type === 'cp') state.allPlayers.cp.push({ id: newId, name: `追加選手 ${newNum}`, shots: initialShots(), errors: 0 });
            else state.allPlayers.gk.push({ id: newId, name: `追加GK ${newNum}`, faced: initialGKShots(), errors: 0 });
            executeSwap(newId);
        }

        // --- 入力画面の描画 ---
        function updateInputDisplays() {
            let totalCPGoals = 0, totalCPShots = 0, totalCPErrors = 0;
            state.allPlayers.cp.forEach(p => {
                let pGoals = 0, pMiss = 0;
                for (const t of shotTypesArray) { pGoals += p.shots[t].goals; pMiss += p.shots[t].miss; }
                const pShots = pGoals + pMiss; totalCPGoals += pGoals; totalCPShots += pShots; totalCPErrors += p.errors;
                if(state.activeCPIds.includes(p.id)) {
                    document.getElementById(`cp-total-${p.id}`).textContent = pShots; document.getElementById(`cp-goals-${p.id}`).textContent = pGoals;
                    document.getElementById(`cp-rate-${p.id}`).textContent = pShots === 0 ? 0 : (pGoals / pShots * 100).toFixed(0);
                    document.getElementById(`cp-errors-${p.id}`).textContent = p.errors;
                }
            });
            
            let totalGKSaves = 0, totalGKShots = 0, totalGKErrors = 0;
            state.allPlayers.gk.forEach(p => {
                let tSaves = 0, tAllowed = 0;
                for (const t of shotTypesArray) { tSaves += p.faced[t].saves; tAllowed += p.faced[t].allowed; }
                const faced = tSaves + tAllowed;
                totalGKSaves += tSaves; totalGKShots += faced; totalGKErrors += p.errors;
                if(state.activeGKId === p.id) {
                    document.getElementById(`gk-total-${p.id}`).textContent = faced; document.getElementById(`gk-saves-${p.id}`).textContent = tSaves;
                    document.getElementById(`gk-rate-${p.id}`).textContent = faced === 0 ? 0 : (tSaves / faced * 100).toFixed(0);
                    document.getElementById(`gk-errors-${p.id}`).textContent = p.errors;
                }
            });

            document.getElementById('score-team').textContent = totalCPGoals;
            document.getElementById('score-opponent').textContent = totalGKShots - totalGKSaves;
        }

        // ==========================================
        // 📊 リアルタイム分析ダッシュボードの描画
        // ==========================================
        function renderRealtimeDashboard() {
            let stats = {
                goals: 0, miss: 0, errors: 0, saves: 0, allowed: 0, opponent_errors: state.opponentStats.errors,
                types: { L: {g:0, m:0}, M: {g:0, m:0}, C: {g:0, m:0}, P: {g:0, m:0}, F: {g:0, m:0}, S: {g:0, m:0}, '7m': {g:0, m:0} },
                gkTypes: { L: {s:0, a:0}, M: {s:0, a:0}, C: {s:0, a:0}, P: {s:0, a:0}, F: {s:0, a:0}, S: {s:0, a:0}, '7m': {s:0, a:0} }
            };

            state.allPlayers.cp.forEach(p => {
                shotTypesArray.forEach(t => {
                    stats.types[t].g += p.shots[t].goals; stats.types[t].m += p.shots[t].miss;
                    stats.goals += p.shots[t].goals; stats.miss += p.shots[t].miss;
                });
                stats.errors += p.errors;
            });

            state.allPlayers.gk.forEach(p => {
                shotTypesArray.forEach(t => {
                    stats.saves += p.faced[t].saves; stats.allowed += p.faced[t].allowed;
                    stats.gkTypes[t].s += p.faced[t].saves; stats.gkTypes[t].a += p.faced[t].allowed;
                });
                stats.errors += p.errors;
            });

            document.getElementById('rt-dash-goals').innerText = stats.goals;
            document.getElementById('rt-dash-allowed').innerText = stats.allowed;
            document.getElementById('rt-dash-errors').innerText = stats.errors;
            document.getElementById('rt-dash-opponent-errors').innerText = stats.opponent_errors;

            document.getElementById('rt-bar-shot-rate').style.width = '0%';
            document.getElementById('rt-bar-save-rate').style.width = '0%';
            document.getElementById('rt-bar-opponent-shot-rate').style.width = '0%';

            setTimeout(() => {
                // 1. 自チームシュート成功率
                const totalShots = stats.goals + stats.miss; const shotRate = totalShots > 0 ? (stats.goals / totalShots) * 100 : 0;
                document.getElementById('rt-dash-shot-rate').innerText = shotRate.toFixed(1);
                document.getElementById('rt-dash-shot-detail').innerText = `${stats.goals} / ${totalShots}`;
                document.getElementById('rt-bar-shot-rate').style.width = `${shotRate}%`;

                // 2. GK セーブ率
                const totalFaced = stats.saves + stats.allowed; const saveRate = totalFaced > 0 ? (stats.saves / totalFaced) * 100 : 0;
                document.getElementById('rt-dash-save-rate').innerText = saveRate.toFixed(1);
                document.getElementById('rt-dash-save-detail').innerText = `${stats.saves} / ${totalFaced}`;
                document.getElementById('rt-bar-save-rate').style.width = `${saveRate}%`;

                // 3. 相手チーム シュート成功率 (失点 / (セーブ+失点))
                const opponentShotRate = totalFaced > 0 ? (stats.allowed / totalFaced) * 100 : 0;
                document.getElementById('rt-dash-opponent-shot-rate').innerText = opponentShotRate.toFixed(1);
                document.getElementById('rt-dash-opponent-shot-detail').innerText = `${stats.allowed} / ${totalFaced}`;
                document.getElementById('rt-bar-opponent-shot-rate').style.width = `${opponentShotRate}%`;
            }, 50);

            // 自チーム シュート内訳
            document.getElementById('rt-shot-types-container').innerHTML = shotTypesArray.map(t => {
                const g = stats.types[t].g; const total = g + stats.types[t].m; const rate = total > 0 ? (g / total) * 100 : 0;
                let colorClass = "text-slate-700"; let topBarColor = "bg-slate-200";
                if(total > 0) { if(rate >= 60) { colorClass = "text-[#0077B6]"; topBarColor = "bg-[#0077B6]"; } else if(rate < 30) { colorClass = "text-rose-500"; topBarColor = "bg-rose-500"; } }
                return `<div class="bg-slate-50 rounded-xl p-2 sm:p-3 flex flex-col justify-center items-center border border-slate-100 relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-1 ${topBarColor}"></div><div class="text-2xl sm:text-3xl font-black stat-value ${colorClass} mt-1 leading-none">${rate.toFixed(0)}<span class="text-[10px] sm:text-xs font-bold ml-0.5 text-slate-400">%</span></div><div class="font-black text-slate-700 mt-1 text-[10px] sm:text-xs whitespace-nowrap">${t} <span class="font-bold text-[8px] sm:text-[9px] text-slate-500 block text-center">${typeLabels[t]}</span></div><div class="mt-auto pt-1 sm:pt-2 w-full text-center border-t border-slate-200 border-dashed"><span class="text-[10px] sm:text-xs font-bold text-slate-600">${g} <span class="text-slate-300 font-normal mx-0.5">/</span> ${total}</span></div></div>`;
            }).join('');

            // 相手チーム シュート内訳 (失点率)
            document.getElementById('rt-gk-shot-types-container').innerHTML = shotTypesArray.map(t => {
                const a = stats.gkTypes[t].a; const total = stats.gkTypes[t].s + a; const rate = total > 0 ? (a / total) * 100 : 0;
                let colorClass = "text-slate-700"; let topBarColor = "bg-slate-200";
                if(total > 0) { if(rate >= 60) { colorClass = "text-rose-500"; topBarColor = "bg-rose-500"; } else if(rate < 30) { colorClass = "text-[#0077B6]"; topBarColor = "bg-[#0077B6]"; } }
                return `<div class="bg-slate-50 rounded-xl p-2 sm:p-3 flex flex-col justify-center items-center border border-slate-100 relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-1 ${topBarColor}"></div><div class="text-2xl sm:text-3xl font-black stat-value ${colorClass} mt-1 leading-none">${rate.toFixed(0)}<span class="text-[10px] sm:text-xs font-bold ml-0.5 text-slate-400">%</span></div><div class="font-black text-slate-700 mt-1 text-[10px] sm:text-xs whitespace-nowrap">${t} <span class="font-bold text-[8px] sm:text-[9px] text-slate-500 block text-center">${typeLabels[t]}</span></div><div class="mt-auto pt-1 sm:pt-2 w-full text-center border-t border-slate-200 border-dashed"><span class="text-[10px] sm:text-xs font-bold text-slate-600"><span class="text-rose-500">${a}</span> <span class="text-slate-300 font-normal mx-0.5">/</span> ${total}</span></div></div>`;
            }).join('');

            const formatType = (t, g, m) => `<span class="mx-0.5 sm:mx-1"><span class="text-slate-400 font-normal">${t}:</span><span class="text-slate-700 font-bold">${g}/${g+m}</span></span>`;
            
            const cpRows = state.allPlayers.cp.filter(p => {
                let s = 0; for(let t in p.shots) s += p.shots[t].goals + p.shots[t].miss; return s > 0 || p.errors > 0;
            }).map(p => {
                let goals=0, misses=0; let detail = '';
                shotTypesArray.forEach(t => { goals += p.shots[t].goals; misses += p.shots[t].miss; detail += formatType(t, p.shots[t].goals, p.shots[t].miss); });
                const shots = goals + misses; const rate = shots > 0 ? ((goals/shots)*100).toFixed(1) : "0.0";
                return `<tr class="hover:bg-blue-50/50"><td class="p-3 sm:p-4 font-bold text-slate-700">${p.name}</td><td class="p-3 sm:p-4 text-center"><span class="bg-blue-100 text-[#0077B6] px-2 py-0.5 rounded text-[10px] font-black">CP</span></td><td class="p-3 sm:p-4 text-right stat-value"><span class="font-bold text-slate-600">${goals}/${shots}</span> <span class="text-[#0077B6] font-black ml-1 sm:ml-2 w-8 sm:w-10 inline-block text-right">${rate}%</span></td><td class="p-3 sm:p-4 text-center text-xs tracking-tighter">${detail}</td><td class="p-3 sm:p-4 text-center stat-value font-black text-amber-500">${p.errors>0?p.errors:'-'}</td><td class="p-3 sm:p-4 text-right text-slate-300">-</td></tr>`;
            }).join('');

            const gkRows = state.allPlayers.gk.filter(p => {
                let f = 0; for(let t in p.faced) f += p.faced[t].saves + p.faced[t].allowed; return f > 0 || p.errors > 0;
            }).map(p => {
                let saves=0, allowed=0; let detail = '';
                shotTypesArray.forEach(t => { 
                    saves += p.faced[t].saves; allowed += p.faced[t].allowed; 
                    detail += formatType(t, p.faced[t].saves, p.faced[t].allowed); 
                });
                const faced = saves + allowed; const rate = faced > 0 ? ((saves/faced)*100).toFixed(1) : "0.0";
                return `<tr class="hover:bg-slate-100"><td class="p-3 sm:p-4 font-bold text-slate-700">${p.name}</td><td class="p-3 sm:p-4 text-center"><span class="bg-slate-200 text-[#0A2444] px-2 py-0.5 rounded text-[10px] font-black">GK</span></td><td class="p-3 sm:p-4 text-right text-slate-300">-</td><td class="p-3 sm:p-4 text-center text-xs tracking-tighter">${detail}</td><td class="p-3 sm:p-4 text-center stat-value font-black text-amber-500">${p.errors>0?p.errors:'-'}</td><td class="p-3 sm:p-4 text-right stat-value"><span class="font-bold text-slate-600">${saves}/${faced}</span> <span class="text-[#0A2444] font-black ml-1 sm:ml-2 w-8 sm:w-10 inline-block text-right">${rate}%</span></td></tr>`;
            }).join('');

            const tbody = document.getElementById('rt-player-stats-container');
            if(cpRows==='' && gkRows==='') tbody.innerHTML = `<tr><td colspan="6" class="p-4 sm:p-6 text-center text-slate-400 font-bold">まだスタッツが記録されていません</td></tr>`;
            else tbody.innerHTML = cpRows + gkRows;
        }

        // 初期起動時は入力画面を描画
        renderAll();

    </script>
</body>
</html>
